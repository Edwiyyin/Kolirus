name: Kolirus
description: "Eat the way your Mediterranean ancestors ate."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3
  path: ^1.9.0
  flutter_riverpod: ^2.5.1
  mobile_scanner: ^5.1.1
  flutter_local_notifications: ^17.2.2
  http: ^1.2.1
  shared_preferences: ^2.3.2
  health: ^13.3.1
  image_picker: ^1.1.2
  fl_chart: ^0.68.0
  cupertino_icons: ^1.0.8
  timezone: ^0.9.4
  intl: ^0.19.0
  file_picker: ^8.0.0
  share_plus: ^10.0.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  adaptive_icon_background: "#4B2E57"
  adaptive_icon_foreground: "assets/logo_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/logo_foreground.png