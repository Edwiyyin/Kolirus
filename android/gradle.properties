properties
# Increase heap size to 4GB (up from 2GB)
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError

android.useAndroidX=true
# Keep this true for other old plugins, but we will optimize memory below
android.enableJetifier=true

# This tells Gradle not to waste memory Jetifying the Flutter JARs
android.jetifier.ignorelist=io.flutter
# Helps Kotlin 2.x with the JDK path
kotlin.jvm.toolchain.check.enabled=true

# The correct Java path (ensure NO trailing space)
org.gradle.java.home=/usr/lib/jvm/java-17-openjdk-amd64